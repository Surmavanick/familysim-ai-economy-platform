name: sync-products

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r collector/requirements.txt

      - run: python collector/main.py
        env:
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
